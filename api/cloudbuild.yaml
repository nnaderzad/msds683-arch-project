# Build + push the API image. The web dashboard is built inside the multi-stage
# api/Dockerfile, so the build context must be the repo root:
#
#   gcloud builds submit --config api/cloudbuild.yaml \
#       --substitutions=_IMAGE=us-west1-docker.pkg.dev/PROJECT/services/event-demand-api:TAG .
steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-f", "api/Dockerfile", "-t", "${_IMAGE}", "."]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
images:
  - "${_IMAGE}"
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _IMAGE: ""
