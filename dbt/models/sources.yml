version: 2

sources:
  - name: ticketmaster_raw
    description: >
      Processed Ticketmaster landing, read zero-copy as a BigQuery **external table**
      over the daily parquet snapshots in GCS. **VESTIGIAL for the price fact** as of the
      forward-fill honesty fix: this parquet is an EXPORT of current-state `tm_events`
      (MERGE-upsert, never deletes), so it carried every event's last-known price *forward*
      into every later day — manufacturing a daily series the sweep never observed.
      `fact_ticketmaster` now reads the honest `silver.tm_observations` instead. Kept here
      for reference / replay; removal is a follow-on.
    database: "{{ env_var('DBT_GCP_PROJECT', 'data-architecture-498123') }}"
    schema: "{{ env_var('DBT_BQ_DATASET', 'event_demand_analytics') }}"
    loader: gcs
    tables:
      - name: tm_snapshots_ext
        description: >
          One row per event per daily snapshot file (forward-filled — see source note).
          The `snapshot_date` is the `dt=` partition. No longer the price-fact source.
        external:
          location: 'gs://data-architecture-498123-processed/ticketmaster/*.parquet'
          options:
            format: parquet

  - name: silver
    description: >
      Silver facts + conformed dimensions built by the Python transforms (A1/A2/A3).
      Referenced as dbt sources until MIG-1/2/3 migrate them to dbt models (after which
      gold flips these `source()`s to `ref()`s with no change to the join logic).
    database: "{{ env_var('DBT_GCP_PROJECT', 'data-architecture-498123') }}"
    schema: "{{ env_var('DBT_BQ_DATASET', 'event_demand_analytics') }}"
    tables:
      - name: tm_observations
        description: >
          **Honest** Ticketmaster price history — one row per (event, snapshot_date) only for
          days the sweep actually OBSERVED the event, price as observed (NULL if observed
          unpriced). Built from raw bronze by `pipeline/silver/tm_observations_to_silver.py`
          (collapses the day's up-to-6 captures: union presence, priced-if-any latest price)
          and kept fresh by the daily cloud function. **No forward-fill.** Replaces the
          forward-filled `ticketmaster_raw.tm_snapshots_ext` parquet as the price-fact source.
      - name: fact_trends
      - name: fact_youtube
      - name: dim_event
      - name: dim_venue
      - name: dim_geo
      - name: dim_artist
      - name: bridge_event_artist
