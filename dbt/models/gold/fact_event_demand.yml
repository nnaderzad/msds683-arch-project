version: 2

models:
  - name: fact_event_demand
    description: >
      Gold star — one wide row per event per daily snapshot (docs/data-model.md §4),
      the model-ready table the forecast + API read. The fact_ticketmaster spine kept
      whole; Trends/YouTube signals LEFT-joined on the headliner artist (NULL where not
      yet collected). Grain = event_id × snapshot_date.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - event_id
              - snapshot_date
    columns:
      - name: event_id
        description: "FK -> dim_event (a few historical events predate current-state dim_event -> warn)."
        tests:
          - not_null
          - relationships:
              arguments:
                to: source('silver', 'dim_event')
                field: event_id
              config:
                severity: warn
      - name: snapshot_date
        tests:
          - not_null
      - name: artist_id
        description: >
          Headliner (via bridge_event_artist.is_headliner); NULL if the event has no
          attraction. Warn, not error: the fact is incremental (point-in-time
          history) while dims rebuild from CURRENT tm_events, so an event whose
          headliner changes leaves old snapshot rows referencing a dropped dim
          member — same expected drift as event_id above (incident 2026-07-05:
          this at ERROR blocked every gold refresh and froze the forecast).
        tests:
          - relationships:
              arguments:
                to: source('silver', 'dim_artist')
                field: artist_id
              config:
                severity: warn
      - name: venue_id
        description: >
          FK -> dim_venue. Warn, not error: same historical-drift rationale as
          artist_id (events change venues; old snapshot rows keep the old venue_id).
        tests:
          - relationships:
              arguments:
                to: source('silver', 'dim_venue')
                field: venue_id
              config:
                severity: warn
      - name: dma_code
        tests:
          - relationships:
              arguments:
                to: source('silver', 'dim_geo')
                field: dma_code
      - name: local_interest
        description: >
          Google Trends interest (0-100, per-pull scale) for headliner+dma+date;
          NULL if uncollected. Sourced COALESCE(fact_trends_daily.interest,
          fact_trends.interest) — daily iot series preferred (dense trajectory for
          tier-1 pairs), ibr snapshot fallback (broad DMA coverage). Late-arriving
          daily values (up to ~4 days, rotation cycle) land via the model's 14-day
          trailing reprocess window.
      - name: yt_subscribers
      - name: yt_views
