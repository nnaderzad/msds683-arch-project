version: 2

models:
  - name: fact_ticketmaster
    description: >
      Silver source fact — Ticketmaster price history at **event x snapshot_date** grain
      (docs/data-model.md §3). Built from the HONEST `silver.tm_observations` (raw-bronze
      observations; **no forward-fill** — a row exists only for days the sweep actually saw
      the event, price as observed). Replaced the forward-filled processed parquet. The spine
      the gold star `fact_event_demand` (B1) left-joins onto.
    columns:
      - name: tm_snapshot_id
        description: "PK — deterministic hash of (event_id, snapshot_date)."
        tests:
          - unique
          - not_null
      - name: event_id
        description: "Ticketmaster event id (FK -> dim_event)."
        tests:
          - not_null
      - name: snapshot_date
        description: "Capture day (FK -> dim_date); the dt= partition from _FILE_NAME."
        tests:
          - not_null
      - name: status_code
        description: "Event status on that snapshot (onsale / offsale / ...)."
      - name: price_type
        description: "Ticketmaster exposes face value only (no resale)."
      - name: price_currency
      - name: price_min
        description: "Min face-value price (USD)."
      - name: price_max
        description: "Max face-value price (USD)."
      - name: public_sale_start_utc
      - name: public_sale_end_utc
      - name: days_to_show
        description: "Derived: show_date - snapshot_date. Negative only if a show already passed."
        tests:
          # Sanity, non-blocking: the vast majority are >= 0 for upcoming shows.
          - dbt_utils.accepted_range:
              arguments:
                min_value: -3650
                max_value: 3650
              config:
                severity: warn
      - name: n_captures
        description: >
          Provenance: how many distinct daily runs/files observed this event (~<=6 recent,
          1 on early single-file days; raw retries can push it higher).
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
              config:
                severity: warn
      - name: price_disagreed
        description: "Provenance: the day's captures conflicted on price/presence (team-derived flag)."
