# Lint config for CI — high-signal rules (real errors, undefined/unused names,
# common bug patterns), not pervasive style nags, so the gate stays meaningful.
target-version = "py311"
line-length = 100

# Presentation artifacts (deck builder, generated .pptx, slide assets) live in their own
# isolated env with their own requirements; slides are tracked separately from the data
# build, so they don't gate the project's data CI.
exclude = ["final_presentation"]

[lint]
select = ["E4", "E7", "E9", "F", "W"]
